name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - LICENSE
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - LICENSE

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kaiser-app/package-lock.json

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        working-directory: kaiser-app
        run: npm ci

      - name: Type-check frontend
        working-directory: kaiser-app
        run: npx tsc --noEmit

      - name: Check Rust
        run: cargo check --workspace
